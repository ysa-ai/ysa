name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "package.json"
      - ".github/workflows/docs.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run docs:build
      - name: Assemble site
        run: |
          mkdir -p _site/docs
          cp -r docs/.vitepress/dist/. _site/docs/
          cp docs/index.html _site/
          for f in docs/robots.txt docs/sitemap.xml docs/llms.txt docs/CNAME; do
            [ -f "$f" ] && cp "$f" _site/ || true
          done
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - uses: actions/deploy-pages@v4
        id: deployment
